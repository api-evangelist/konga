aid: konga
name: Konga
description: >-
  Konga is a Lagos, Nigeria-based e-commerce company founded in July 2012 and
  now operating as Nigeria's leading online shopping marketplace, combining a
  first-party retail business with a third-party seller marketplace across
  consumer electronics, mobile phones, home appliances, fashion, groceries,
  beauty, and lifestyle categories. Konga runs a vertically integrated stack
  alongside its storefront: KongaPay, a Central Bank of Nigeria-licensed and
  NDIC-insured payments platform offering checkout, transfers, virtual
  accounts, multi-currency wallets, POS, bill payments, savings, and merchant
  payouts; Konga Travel & Tours, an IATA-certified travel agency providing
  flight bookings, hotels, and vacation packages; Konga Health (Medical
  Direct); Konga Foods/Groceries; KongaNow same-day delivery; and KXpress
  Logistics for nationwide fulfillment. Konga's revenue model spans
  marketplace commissions, first-party retail margin, KongaPay transaction
  fees, logistics fees, travel agency commissions, and seller advertising.
  Konga does not operate a unified public developer program: the marketplace
  exposes no documented public REST API for orders, products, or sellers;
  KongaPay published Android, iOS, and WooCommerce SDKs and SDK docs at
  kongapay.github.io, but that GitHub organization was archived on July 1,
  2023, and the current KPay aggregator API documentation lives at
  kpayment-org.gitbook.io with limited public surface area focused on POS,
  Web Payment Gateway, Virtual Account, and Payment Link integrations for
  approved merchants. As a result, Konga is profiled here as a provider
  index rather than as an actively documented public-API company.
